<!DOCTYPE html>
<html>
<head>
  <title>Zartour App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: orange;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    .switch {
      margin-top: 10px;
      text-align: center;
      cursor: pointer;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="box">
  <h2 id="title">Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="submitAuth()">Continue</button>

  <div class="switch" onclick="toggleMode()">
    Switch to Signup
  </div>
</div>

<script>
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let isLogin = true;

function toggleMode() {
  isLogin = !isLogin;
  document.getElementById("title").innerText = isLogin ? "Login" : "Signup";
}

async function submitAuth() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Fill all fields");
    return;
  }

  let res;

  if (isLogin) {
    res = await client.auth.signInWithPassword({ email, password });
  } else {
    res = await client.auth.signUp({ email, password });
  }

  if (res.error) {
    alert(res.error.message);
  } else {
    window.location.href = "dashboard.html";
  }
}
</script>

</body>
</html>
