<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zartour Form</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
    input, textarea, button { width:100%; padding:10px; margin:5px 0; border-radius:5px; }
    button { background:#4ade80; color:#0f172a; font-weight:bold; cursor:pointer; }
    button:hover { background:#22c55e; }
  </style>
</head>
<body>

<h1>🌍 Zartour Experience</h1>

<div id="form-container">
  <input type="text" id="name" placeholder="Full Name"><br>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="text" id="phone" placeholder="Phone Number"><br>
  <input type="text" id="address" placeholder="Residential Address"><br>
  <input type="text" id="place" placeholder="Place You Visited"><br>
  <textarea id="knowledge" placeholder="What do you know about this place?"></textarea><br>
  <input type="file" id="proof"><br>
  <button id="submitBtn">Submit</button>
</div>

<script src="form.js"></script>
</body>
</html>
