<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px;
      background: orange;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Welcome to Zartour</h1>

<div class="card">
  <h3 id="name">Loading...</h3>
  <p id="points">Points: 0</p>
</div>

<button onclick="logout()">Logout</button>

<script>
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadUser() {
  const { data: { user } } = await client.auth.getUser();

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const { data } = await client
    .from("users")
    .select("*")
    .eq("id", user.id)
    .single();

  document.getElementById("name").innerText = data.full_name || user.email;
  document.getElementById("points").innerText = "Points: " + data.total_points;
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "index.html";
}

loadUser();
</script>

</body>
</html>
